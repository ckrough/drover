# Drover Configuration
# Document classification CLI using LLMs
#
# Precedence (highest to lowest):
# 1. CLI options
# 2. Config file (this file)
# 3. Environment variables (DROVER_*)
# 4. Defaults

# ============================================================================
# AI Provider Settings
# ============================================================================
ai:
  # Provider: ollama, openai, anthropic, openrouter
  provider: ollama

  # Model name (provider-specific)
  # Examples:
  #   ollama: llama3.2:latest, mistral:latest, codellama:latest
  #   openai: gpt-4o, gpt-4o-mini, gpt-4-turbo
  #   anthropic: claude-sonnet-4-20250514, claude-3-5-haiku-20241022
  #   openrouter: anthropic/claude-sonnet-4, openai/gpt-4o
  model: deepseek-r1:latest

  # Temperature for LLM responses (0.0 = deterministic, 2.0 = creative)
  temperature: 0.0

  # Maximum tokens in LLM response
  max_tokens: 4000

  # Request timeout in seconds
  timeout: 60

  # Retry settings for failed requests
  max_retries: 3
  retry_min_wait: 2.0
  retry_max_wait: 10.0

# ============================================================================
# Classification Settings
# ============================================================================

# Taxonomy for classification categories
# Available: household
taxonomy: household

# Taxonomy validation mode:
#   strict   - Reject unknown values (raises error)
#   fallback - Map unknown values to "other" category
taxonomy_mode: strict 

# Naming policy for generated filenames
# Available: nara (NARA-compliant format: {doctype}-{vendor}-{subject}-{YYYYMMDD}.{ext})
naming_style: nara

# ============================================================================
# Document Processing
# ============================================================================

# Page sampling strategy for large documents:
#   full     - Process entire document
#   first_n  - First N pages only
#   bookends - First + last N pages
#   adaptive - Auto-select based on document size/type
sample_strategy: adaptive

# Maximum pages to sample (applies to first_n, bookends, adaptive)
max_pages: 10

# ============================================================================
# Output and Logging
# ============================================================================

# Log level:
#   quiet   - JSON output only
#   verbose - Progress messages to stderr
#   debug   - Detailed debug output
log_level: quiet  

# Error handling mode:
#   fail     - Stop on first error
#   continue - Log error, continue batch processing
#   skip     - Silently skip failures
on_error: continue

# ============================================================================
# Performance
# ============================================================================

# Number of documents to process in parallel
concurrency: 1

# ============================================================================
# Debugging
# ============================================================================

# Enable classification metrics tracking
metrics: false

# Capture debug information (prompts and responses)
capture_debug: false

# Directory for debug output files (when capture_debug is true)
# debug_dir: ./debug

# Custom prompt template file path (Jinja2 template)
# prompt: /path/to/custom/prompt.md
