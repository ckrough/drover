# Example Experiment Manifest
# Copy this file and customize for your evaluation runs.
#
# Usage:
#   python scripts/eval_runner.py run eval/my_experiment.yaml
#   python scripts/eval_runner.py report eval/results/my_experiment-*.jsonl

name: "example-model-comparison"
description: "Example experiment comparing models on test documents"

# Models to test - each document will be classified by each model.
# Default: gemma4 (extracts dates and doctypes more accurately than llama3.2 in
# local benchmarks). Uncomment additional models to compare side by side.
models:
  - provider: ollama
    model: gemma4:latest
  # - provider: ollama
  #   model: llama3.2:latest
  # - provider: openai
  #   model: gpt-4o-mini
  # - provider: anthropic
  #   model: claude-sonnet-4-20250514

# Shared configuration applied to all runs (optional)
# These override drover defaults but can be further overridden per-model if needed
config:
  taxonomy: household
  taxonomy_mode: fallback
  sample_strategy: adaptive
  max_pages: 10
  # prompt: path/to/custom-prompt.md  # Custom prompt template (optional)

# Test documents with ground truth labels
# Place your test documents under eval/samples/ (or any path) and reference them here.
# Expected values must use canonical taxonomy terms (see src/drover/taxonomy/household.py).
# vendor: full organization name; subject: 2-4 lowercase words; date: YYYYMMDD or "00000000".
documents:
  # Example entry - uncomment and modify for your documents:
  #
  # - path: eval/samples/invoice-acme-2024.pdf
  #   expected:
  #     domain: household
  #     category: expense
  #     doctype: invoice
  #     vendor: "Acme Corporation"
  #     date: "20240115"
  #     subject: "office supplies"
  #
  # - path: eval/samples/medical-statement.pdf
  #   expected:
  #     domain: medical
  #     category: expense
  #     doctype: statement
  #     vendor: "Kaiser Permanente"
  #     date: "20240201"
  #     subject: "annual physical"

  # Sample test documents
  - path: eval/samples/medical_bill.pdf
    expected:
      domain: medical
      category: expense
      doctype: invoice
      vendor: "Northern Virginia Medical Center"
      date: "20241101"
      subject: "medical services"
  - path: eval/samples/receipt.pdf
    expected:
      domain: pets
      category: expense
      doctype: receipt
      vendor: "PetSmart"
      date: "20241208"
      subject: "pet supplies"
  - path: eval/samples/user_manual.pdf
    expected:
      domain: household
      category: documentation
      doctype: manual
      vendor: "smarthub"
      date: "20240901"
      subject: "smarthub 3000"