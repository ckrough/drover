# Anthropic Workbench Experiment Manifest
# This experiment runs classification tests using Claude Sonnet 4.5
# and captures debug outputs (prompts/responses) for Workbench analysis.
#
# Usage:
#   export ANTHROPIC_API_KEY="your-key-here"
#   python scripts/eval_runner.py run eval/workbench-tuning.yaml -v
#   python scripts/eval_runner.py report eval/results/anthropic-workbench-tuning-*.jsonl

name: "anthropic-workbench-tuning"
description: "Classification experiment using Anthropic Claude Sonnet 4.5 for Workbench analysis"

# Model to test
models:
  - provider: anthropic
    model: claude-sonnet-4-5-20250929
  - provider: anthropic
    model: claude-haiku-4-5-20251001
  - provider: anthropic
    model: claude-opus-4-5-20251101
  - provider: openrouter
    model: x-ai/grok-4.1-fast
  - provider: openrouter
    model: google/gemini-2.5-flash
  - provider: openrouter
    model: openai/gpt-oss-120b

# Configuration - enables debug output for Workbench
config:
  taxonomy: household
  taxonomy_mode: fallback
  sample_strategy: adaptive
  max_pages: 10
  capture_debug: true
  debug_dir: eval/results/debug

# Test documents with ground truth labels
documents:
  - path: eval/samples/medical_bill.pdf
    expected:
      domain: medical
      category: expense
      doctype: statement
      vendor: "Northern Virginia Medical Center"
      date: "20241022"
      subject: "office visit lab tests"

  - path: eval/samples/receipt.pdf
    expected:
      domain: pets
      category: expense
      doctype: receipt
      vendor: "PetSmart"
      date: "20241208"
      subject: "dog food and supplies"

  - path: eval/samples/user_manual.pdf
    expected:
      domain: household
      category: network
      doctype: manual
      vendor: unknown
      date: "20240901"
      subject: "smarthub 3000"
